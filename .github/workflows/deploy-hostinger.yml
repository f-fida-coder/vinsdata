name: Deploy frontend + api to Hostinger

# Push frontend build output and api code to Hostinger on every push to main.
# Runtime upload files in api/uploads/ are preserved and never deleted.
#
# Required GitHub Secrets:
#   HOSTINGER_SSH_HOST   - SSH host, e.g. srv2052.hstgr.io
#   HOSTINGER_SSH_USER   - SSH user, e.g. u487877829
#   HOSTINGER_SSH_PORT   - SSH port, e.g. 65002
#   HOSTINGER_SSH_KEY    - Private SSH key (full file contents)
#   HOSTINGER_DEPLOY_DIR - Absolute public_html path on server

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup PHP + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install API composer dependencies
        working-directory: api
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Build frontend only
        run: npm run build

      - name: Verify required secrets exist
        run: |
          missing=""
          [ -z "${{ secrets.HOSTINGER_SSH_HOST }}" ]   && missing="$missing HOSTINGER_SSH_HOST"
          [ -z "${{ secrets.HOSTINGER_SSH_USER }}" ]   && missing="$missing HOSTINGER_SSH_USER"
          [ -z "${{ secrets.HOSTINGER_SSH_PORT }}" ]   && missing="$missing HOSTINGER_SSH_PORT"
          [ -z "${{ secrets.HOSTINGER_SSH_KEY }}" ]    && missing="$missing HOSTINGER_SSH_KEY"
          [ -z "${{ secrets.HOSTINGER_DEPLOY_DIR }}" ] && missing="$missing HOSTINGER_DEPLOY_DIR"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      - name: Setup SSH key
        env:
          KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOST_RAW: ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT_RAW: ${{ secrets.HOSTINGER_SSH_PORT }}
          USER_RAW: ${{ secrets.HOSTINGER_SSH_USER }}
          DEPLOY_DIR_RAW: ${{ secrets.HOSTINGER_DEPLOY_DIR }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          PORT=$(printf '%s' "$PORT_RAW" | tr -dc '0-9')
          HOST=$(printf '%s' "$HOST_RAW" | tr -d '[:space:]')
          USER=$(printf '%s' "$USER_RAW" | tr -d '[:space:]')
          DEPLOY_DIR=$(printf '%s' "$DEPLOY_DIR_RAW" | tr -d '\r\n' | sed 's/[[:space:]]*$//' | sed 's/^[[:space:]]*//')

          if [ -z "$PORT" ] || [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$DEPLOY_DIR" ]; then
            echo "::error::One or more SSH secrets are empty after trimming"
            exit 1
          fi

          printf '%s\n' "$KEY" | sed 's/\r$//' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null 2>&1; then
            echo "::error::HOSTINGER_SSH_KEY is malformed"
            exit 1
          fi

          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

          {
            echo "PORT=$PORT"
            echo "HOST=$HOST"
            echo "USER=$USER"
            echo "DEPLOY_DIR=$DEPLOY_DIR"
          } >> "$GITHUB_ENV"

      - name: Ensure remote directories exist
        run: |
          ssh -p "$PORT" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              "$USER@$HOST" \
              "mkdir -p '$DEPLOY_DIR' '$DEPLOY_DIR/api' '$DEPLOY_DIR/api/uploads'"

      - name: Deploy dist to Hostinger (frontend)
        # --delete cleans stale hashed assets out of the webroot, but we MUST
        # exclude the server-managed config files that aren't in the repo:
        #   .env       - DB credentials, written once by vps-setup.sh
        #   api/       - PHP backend (deployed in next step)
        #   .htaccess  - re-uploaded by the SPA rewrite step below
        # If you drop any of these excludes, the next deploy will silently
        # delete a production secret and the API will start 500-ing.
        run: |
          rsync -avz --delete \
            --exclude='api/' \
            --exclude='.env' \
            --exclude='.htaccess' \
            --exclude='.user.ini' \
            -e "ssh -p $PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./dist/ \
            "$USER@$HOST:$DEPLOY_DIR/"

      - name: Deploy api to Hostinger (preserve runtime files)
        run: |
          rsync -avz \
            --exclude='uploads/' \
            --exclude='.env' \
            --exclude='.user.ini' \
            --exclude='.htaccess' \
            -e "ssh -p $PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./api/ \
            "$USER@$HOST:$DEPLOY_DIR/api/"

      - name: Upload SPA rewrite config
        run: |
          if [ -f .htaccess ]; then
            rsync -avz \
              -e "ssh -p $PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
              ./.htaccess \
              "$USER@$HOST:$DEPLOY_DIR/.htaccess"
          else
            echo "No .htaccess file found in repo root."
          fi

      - name: Fix ownership + uploads permissions on VPS
        # On the VPS, PHP runs as www-data via php-fpm. After rsync the files
        # are owned by the SSH user (root) — chown the whole tree to www-data
        # so php-fpm can read everything, and make uploads/ group-writable so
        # the app can write user uploads.
        run: |
          ssh -p "$PORT" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              "$USER@$HOST" \
              "chown -R www-data:www-data '$DEPLOY_DIR' && chmod 0775 '$DEPLOY_DIR/api/uploads' && ls -ld '$DEPLOY_DIR/api/uploads'"

      - name: Force OPcache refresh on all PHP files
        # rsync sometimes leaves LSPHP's OPcache out of sync with the new
        # files on disk → every PHP endpoint 500s until workers cycle. Has
        # hit production 4+ times (0fb1650, 3462188, 522bb97, a2fca50).
        # Touching every .php file gives them a fresh mtime so OPcache
        # invalidates and reloads from disk on the next request.
        run: |
          ssh -p "$PORT" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              "$USER@$HOST" \
              "find '$DEPLOY_DIR/api' -name '*.php' -type f -exec touch {} + && echo 'OPcache reset: touched' \$(find '$DEPLOY_DIR/api' -name '*.php' -type f | wc -l) 'PHP files'"

      - name: Verify deployment
        run: |
          ssh -p "$PORT" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              "$USER@$HOST" \
              "echo 'Deployed files:' && ls -la '$DEPLOY_DIR' | head -30 && echo '---' && ls -la '$DEPLOY_DIR/assets' | head -20 && echo 'Uploads folder:' && ls -ld '$DEPLOY_DIR/api/uploads'"

      - name: Smoke-test the live site
        # Catch the bad-deploy class of outages (missing .env, broken
        # config, PHP fatal on bootstrap). We hit three endpoints:
        #   /            - SPA HTML; proves nginx + static serving
        #   /api/auth    - POST without creds → must return 401 JSON
        #                  (a 500 here means PHP cant boot — fail fast)
        #   /api/leads   - GET without session → must return 401
        # Anything 5xx fails the deploy job so a regression is loud,
        # not silent. Give propagation/php-fpm reload 5s of grace first.
        run: |
          sleep 5
          set -e
          BASE="https://crm.vinvault.us"

          html_code=$(curl -sS -o /dev/null -w '%{http_code}' "$BASE/")
          echo "GET /                → $html_code"
          [ "$html_code" = "200" ] || { echo "::error::SPA root returned $html_code"; exit 1; }

          auth_code=$(curl -sS -o /tmp/auth.out -w '%{http_code}' \
            -X POST "$BASE/api/auth" \
            -H 'Content-Type: application/json' \
            -d '{"email":"smoketest@ci.local","password":"deliberately-wrong"}')
          echo "POST /api/auth       → $auth_code  body: $(cat /tmp/auth.out | head -c 120)"
          [ "$auth_code" = "401" ] || { echo "::error::/api/auth expected 401 (bad creds), got $auth_code"; exit 1; }

          leads_code=$(curl -sS -o /dev/null -w '%{http_code}' "$BASE/api/leads")
          echo "GET /api/leads       → $leads_code"
          # 401 = unauth required (good). 5xx = PHP/SQL broken (bad).
          case "$leads_code" in
            401|403) echo "smoke OK" ;;
            5*)      echo "::error::/api/leads returned $leads_code"; exit 1 ;;
            *)       echo "::warning::/api/leads returned unexpected $leads_code"; exit 1 ;;
          esac
