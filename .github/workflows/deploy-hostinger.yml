name: Sync api/ to Hostinger

# Why this exists:
# Hostinger's native Git auto-deploy is connected to this repo, but its
# .builds/ → public_html/ copy step is unreliable for the api/ folder —
# files inside api/ frequently fail to update after a push. This workflow
# SSHs into the server after each push and force-copies the api/ folder
# from Hostinger's own freshly-pulled git working copy in .builds/ over
# to public_html/api/ — guaranteeing every PHP file is in sync.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   HOSTINGER_SSH_HOST   - the SSH host (shown in hPanel → Advanced → SSH Access),
#                          e.g. "srv2052.hstgr.io"
#   HOSTINGER_SSH_USER   - your SSH username (e.g. "u487877829")
#   HOSTINGER_SSH_PORT   - the SSH port (Hostinger uses 65002 by default)
#   HOSTINGER_SSH_KEY    - the PRIVATE SSH key (whole file contents, including
#                          BEGIN/END lines). Generate with `ssh-keygen -t ed25519`,
#                          paste the .pub side into hPanel → SSH Access → Manage
#                          SSH Keys, paste the private side into this secret.
#   HOSTINGER_DEPLOY_DIR - absolute path to the deploy folder, e.g.
#                          "/home/u487877829/domains/yourdomain.com/public_html"

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sync-api:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.HOSTINGER_SSH_PORT }}" -H "${{ secrets.HOSTINGER_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Force-sync api/ from .builds/ → public_html/api/
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          USER: ${{ secrets.HOSTINGER_SSH_USER }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          DEPLOY_DIR: ${{ secrets.HOSTINGER_DEPLOY_DIR }}
        run: |
          ssh -p "$PORT" -i ~/.ssh/id_ed25519 "$USER@$HOST" bash <<'EOF'
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.HOSTINGER_DEPLOY_DIR }}"

            # Hostinger's git working copy lives under .builds/<some-hash>/
            BUILDS_DIR=$(ls -dt "$DEPLOY_DIR/.builds"/*/ 2>/dev/null | head -n 1 || true)
            if [ -z "$BUILDS_DIR" ] || [ ! -d "$BUILDS_DIR/api" ]; then
              echo "ERROR: could not find .builds/*/api on the server"
              echo "Looked in: $DEPLOY_DIR/.builds"
              ls -la "$DEPLOY_DIR/.builds" || true
              exit 1
            fi

            echo "Syncing $BUILDS_DIR/api/ → $DEPLOY_DIR/api/"

            # Use rsync to mirror api/ exactly — including deletions and
            # preserving permissions Hostinger's git uses. Excludes uploads/
            # so user-uploaded files on the server aren't wiped.
            rsync -av --delete \
              --exclude="uploads/" \
              "$BUILDS_DIR/api/" "$DEPLOY_DIR/api/"

            # Make sure config.php is readable by PHP.
            chmod 644 "$DEPLOY_DIR/api/"*.php 2>/dev/null || true
            chmod 755 "$DEPLOY_DIR/api/" 2>/dev/null || true

            echo "Done. api/ is now in sync with the latest commit."
            ls -la "$DEPLOY_DIR/api/" | head -20
          EOF
