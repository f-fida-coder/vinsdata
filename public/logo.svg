<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded-square plate. Slight gradient gives the surface a soft
       sheen instead of looking flat. The bottom shade is a touch
       lighter so the icon doesn't melt into pure black backgrounds. -->
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#141416"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#plate)"/>
  <!-- Two italic forward slashes // — slanted top-right to bottom-left,
       cream-tinted off-white to match the source mark. -->
  <polygon points="24,17 31,17 19,47 12,47" fill="#f4ede0"/>
  <polygon points="42,17 49,17 37,47 30,47" fill="#f4ede0"/>
</svg>
